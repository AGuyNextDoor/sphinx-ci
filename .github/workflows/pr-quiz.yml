name: PR Quiz

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  quiz:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@sphinx-ci')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);
            core.setOutput('title', pr.data.title);

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set pending status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ steps.pr.outputs.head_sha }}',
              state: 'pending',
              context: 'pr-quiz',
              description: 'Quiz pending...',
            });

      - name: Generate quiz
        env:
          PR_QUIZ_API_KEY: ${{ secrets.PR_QUIZ_API_KEY }}
          PR_QUIZ_HUB_URL: ${{ vars.PR_QUIZ_HUB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA="${{ steps.pr.outputs.head_sha }}"
          BASE_SHA="${{ steps.pr.outputs.base_sha }}"
          PR_TITLE="${{ steps.pr.outputs.title }}"
          PR_NUMBER="${{ github.event.issue.number }}"

          # Get code-only diff (max 12k chars)
          DIFF=$(git diff ${BASE_SHA}...${HEAD_SHA} \
            -- '*.js' '*.ts' '*.jsx' '*.tsx' '*.py' '*.go' '*.java' '*.rs' '*.rb' '*.php' '*.cs' '*.cpp' \
            | head -c 12000)

          FILES=$(git diff --name-only ${BASE_SHA}...${HEAD_SHA} | tr '\n' ',' | sed 's/,$//')

          # Send to hub (hub handles all comments: skip, quiz link, errors)
          HTTP_CODE=$(curl -s -o /tmp/sphinx_response.json -w "%{http_code}" -X POST "$PR_QUIZ_HUB_URL/api/quiz" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $PR_QUIZ_API_KEY" \
            -d "{
              \"repo\": \"${{ github.repository }}\",
              \"pr_number\": ${PR_NUMBER},
              \"head_sha\": \"${HEAD_SHA}\",
              \"pr_title\": $(echo "$PR_TITLE" | jq -Rs .),
              \"diff\": $(echo "$DIFF" | jq -Rs .),
              \"files_changed\": $(echo "$FILES" | jq -Rs 'split(",")'),
              \"callback_token\": \"$GITHUB_TOKEN\",
              \"anthropic_api_key\": \"$ANTHROPIC_API_KEY\"
            }")

          RESPONSE=$(cat /tmp/sphinx_response.json 2>/dev/null || echo '{}')

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            QUIZ_URL=$(echo "$RESPONSE" | jq -r '.quiz_url // empty')
            SKIPPED=$(echo "$RESPONSE" | jq -r '.skipped // false')
            if [ "$SKIPPED" = "true" ]; then
              echo "No code changes — skipped (comment posted by hub)"
            else
              echo "Quiz created: $QUIZ_URL"
            fi
          else
            echo "Hub returned HTTP $HTTP_CODE"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            # Fail-open: don't block the PR on hub errors
            exit 0
          fi
